<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crear cuenta - Merrali</title>
  <link rel="stylesheet" href="/css/app.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="auth-page merrali-auth">
  <div class="auth-bg"></div>
  <div class="auth-container">
    <a href="/" class="auth-logo"><i class="fas fa-seedling"></i> Merrali</a>
    <div class="auth-card">
      <h2 data-i18n="register_title">Crear cuenta</h2>
      <div class="role-tabs">
        <button class="role-tab active" data-role="buyer" onclick="selectRole('buyer',this)"><i class="fas fa-home"></i> <span data-i18n="role_buyer">Comprador</span></button>
        <button class="role-tab" data-role="seller" onclick="selectRole('seller',this)"><i class="fas fa-tractor"></i> <span data-i18n="role_seller">Vendedor</span></button>
        <button class="role-tab" data-role="notary" onclick="selectRole('notary',this)"><i class="fas fa-stamp"></i> <span data-i18n="role_notary">Escribano</span></button>
      </div>
      <input type="hidden" id="selectedRole" value="buyer">
      <form id="registerForm">
        <div class="form-group"><label data-i18n="lbl_name">Nombre completo</label><input type="text" id="name" required></div>
        <div class="form-group"><label>Email</label><input type="email" id="email" required></div>
        <div class="form-group"><label data-i18n="lbl_password">Contraseña</label><input type="password" id="password" required minlength="6"></div>
        <div class="form-row">
          <div class="form-group"><label data-i18n="lbl_country">País</label><select id="country"><option value="">Seleccionar...</option></select></div>
          <div class="form-group"><label data-i18n="lbl_phone">Teléfono</label><input type="tel" id="phone" placeholder="+54 11..."></div>
        </div>
        <div id="errorMsg" class="error-msg" style="display:none"></div>
        <button type="submit" class="btn btn-primary btn-block" id="submitBtn"><i class="fas fa-user-plus"></i> <span data-i18n="btn_register">Crear cuenta</span></button>
      </form>
      <p class="auth-link"><a href="/login" data-i18n="have_account">Ya tengo cuenta</a></p>
    </div>
  </div>
  <script src="/js/app.js"></script><script src="/js/auth.js"></script>
</body>
</html>
