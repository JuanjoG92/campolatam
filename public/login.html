<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ingresar - Merrali</title>
  <link rel="stylesheet" href="/css/app.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="auth-page merrali-auth">
  <div class="auth-bg"></div>
  <div class="auth-container">
    <a href="/" class="auth-logo"><i class="fas fa-seedling"></i> Merrali</a>
    <div class="auth-card">
      <h2 data-i18n="login_title">Ingresar</h2>
      <form id="loginForm">
        <div class="form-group"><label><i class="fas fa-envelope"></i> Email</label><input type="email" id="email" required placeholder="tu@email.com"></div>
        <div class="form-group"><label><i class="fas fa-lock"></i> <span data-i18n="lbl_password">Contraseña</span></label><input type="password" id="password" required></div>
        <div id="errorMsg" class="error-msg" style="display:none"></div>
        <button type="submit" class="btn btn-primary btn-block" id="submitBtn"><i class="fas fa-sign-in-alt"></i> <span data-i18n="nav_login">Ingresar</span></button>
      </form>
      <p class="auth-link" data-i18n="no_account">¿No tenés cuenta? <a href="/register">Crear cuenta</a></p>
    </div>
  </div>
  <script src="/js/app.js"></script><script src="/js/auth.js"></script>
</body>
</html>
